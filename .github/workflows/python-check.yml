name: Python Syntax Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      continue-on-error: true
    
    - name: Check Python syntax
      run: |
        python -m py_compile generate_report.py server.py
        python -m py_compile src/*.py
      continue-on-error: true
    
    - name: Check for hardcoded secrets
      run: |
        # Check for potential API keys in Python files
        ! grep -r "sk-[a-zA-Z0-9]\{20,\}" --include="*.py" . 2>/dev/null || echo "Potential OpenAI API key found"
        ! grep -r "7o9jl\|tmapi\|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" --include="*.py" . 2>/dev/null || echo "Potential API token found"
      continue-on-error: true
